<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clothing Shop Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    display:flex;
    background:linear-gradient(135deg,#667eea,#764ba2);
    min-height:100vh;
}

/* Sidebar */
.sidebar{
    width:260px;
    height:100vh;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(15px);
    padding:25px;
    position:fixed;
    color:white;
    border-right:1px solid rgba(255,255,255,0.2);
}

.sidebar h2{
    text-align:center;
    margin-bottom:40px;
    font-weight:600;
}

.sidebar ul{
    list-style:none;
}

.sidebar ul li{
    padding:14px 18px;
    margin:12px 0;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
    font-weight:500;
}

.sidebar ul li:hover{
    background:rgba(255,255,255,0.25);
    transform:translateX(5px);
}

.sidebar ul li.active{
    background:white;
    color:#764ba2;
}

/* Main Content */
.main-content{
    margin-left:260px;
    padding:40px;
    width:100%;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:40px;
}

.header h1{
    font-size:32px;
    color:white;
    font-weight:600;
}

.profile{
    background:white;
    color:#764ba2;
    padding:10px 25px;
    border-radius:25px;
    font-weight:500;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* Cards */
.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

.card{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(20px);
    padding:30px;
    border-radius:20px;
    color:white;
    box-shadow:0 8px 25px rgba(0,0,0,0.2);
    transition:0.4s ease;
    position:relative;
    overflow:hidden;
}

.card:hover{
    transform:translateY(-8px) scale(1.02);
    box-shadow:0 15px 35px rgba(0,0,0,0.3);
}

.card h3{
    margin-bottom:10px;
    font-weight:400;
    opacity:0.9;
}

.card h2{
    font-size:28px;
    font-weight:600;
}

/* Decorative Glow */
.card::before{
    content:'';
    position:absolute;
    width:120px;
    height:120px;
    background:rgba(255,255,255,0.2);
    border-radius:50%;
    top:-30px;
    right:-30px;
}

/* Responsive */
@media(max-width:768px){
    .sidebar{
        width:200px;
    }
    .main-content{
        margin-left:200px;
        padding:20px;
    }
}

/* Logout Button */
.logout{
    position:absolute;
    bottom:30px;
    left:25px;
    right:25px;
    padding:14px;
    text-align:center;
    border-radius:12px;
    background:linear-gradient(45deg,#ff416c,#ff4b2b);
    color:white;
    font-weight:500;
    cursor:pointer;
    transition:0.3s ease;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.logout:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 20px rgba(0,0,0,0.4);
    background:linear-gradient(45deg,#ff4b2b,#ff416c);
}
</style>
</head>
<body>

<div class="sidebar">
    <h2>👕 {{ session['delivery_name'] }}</h2>
    <ul>
        <li class="active">🏠 Dashboard</li>
        <a href="/delivery_history" style="text-decoration: none;color:white;"><li>📦 Order History</li></a>
    </ul>

    <a href="/logout">
        <div class="logout">
            🚪 Logout 
        </div>
    </a>

</div>

<div class="main-content">

    <div class="header">
        <h1>Dashboard Overview</h1>
        <div class="profile">Admin</div>
    </div>

    <div class="cards">
        <div class="card">
            <h3>Total order</h3>
            <h2>{{tot}}</h2>
        </div>
        <!-- NEW ORDERS SECTION -->
        <!-- <h2 style="color:white; margin-top:30px;">🚚 New Orders</h2> -->
        <div id="orders-container" class="cards">
        <!-- AJAX will load orders here -->
        </div>
    </div>
<br> <br>
    <div class="cards">
        <div class="card">
            <h3>Total Sale</h3>
            <h2>{{sal}}</h2>
        </div>
        <!-- NEW ORDERS SECTION -->
        <!-- <h2 style="color:white; margin-top:30px;">🚚 New Orders</h2> -->
        <div id="orders-container" class="cards">
        <!-- AJAX will load orders here -->
        </div>
    </div>

</div>


<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
function fetchOrders() {
    $.getJSON("/api/new_orders", function(data){
        let ordersDiv = $("#orders-container");
        ordersDiv.empty(); // Clear old content

        if(data.orders.length === 0){
            ordersDiv.html('<div class="card" style="background:rgba(255,255,255,0.1);color:white;"><h3 class="text-center p-3">No New Orders 😔</h3></div>');
            return;
        }

        data.orders.forEach(function(order){
            let orderCard = `
            <div class="card">
                <img src="/static/uploads/${order.photo}" style="width:100%; height:200px; object-fit:cover; border-radius:15px;">
                <div style="margin-top:10px;">
                    <h3>${order.product_name}</h3>
                    <p>Price: ₹ ${order.price}</p>
                    <p>Customer: ${order.customer_name} (${order.customer_phone})</p>
                    <p>Shop: ${order.shop_name} (${order.shop_phone})</p>
                    <a href="/accept_order/${order.order_id}" class="btn" style="background:#28a745; color:white; width:100%; border-radius:10px; margin-top:10px;">Accept Order</a>
                </div>
            </div>
            `;
            ordersDiv.append(orderCard);
        });
    });
}

// Initial fetch
fetchOrders();

// Auto-refresh every 5 seconds
setInterval(fetchOrders, 5000);
</script>
</body>
</html>
